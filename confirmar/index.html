<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Zé Delivery</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Poppins',sans-serif;
}

body{
    min-height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    background:linear-gradient(135deg,#FFD400,#FFC107);
    overflow:hidden;
    position:relative;
}

/* Efeitos de fundo */

.bg-circle-1{
    position:absolute;
    width:500px;
    height:500px;
    border-radius:50%;
    background:rgba(255,255,255,.15);
    top:-200px;
    right:-120px;
}

.bg-circle-2{
    position:absolute;
    width:350px;
    height:350px;
    border-radius:50%;
    background:rgba(255,255,255,.10);
    bottom:-150px;
    left:-100px;
}

.bg-circle-3{
    position:absolute;
    width:200px;
    height:200px;
    border-radius:50%;
    background:rgba(255,255,255,.12);
    top:15%;
    left:10%;
}

/* Card principal */

.card{
    width:90%;
    max-width:500px;
    background:white;
    border-radius:32px;
    padding:50px 35px;
    text-align:center;
    box-shadow:0 25px 70px rgba(0,0,0,.18);
    position:relative;
    z-index:10;
}

/* Logo */

.logo{
    width:110px;
    height:110px;
    background:#FFD400;
    border-radius:50%;
    display:flex;
    align-items:center;
    justify-content:center;
    margin:0 auto 25px;
    font-size:50px;
    box-shadow:0 10px 30px rgba(255,212,0,.45);
}

/* Texto */

h1{
    font-size:2.3rem;
    font-weight:800;
    color:#222;
    margin-bottom:10px;
}

.subtitle{
    font-size:1rem;
    color:#666;
    margin-bottom:35px;
}

/* Botão */

.btn{
    display:block;
    width:100%;
    background:#111;
    color:white;
    text-decoration:none;
    padding:20px;
    border-radius:18px;
    font-size:20px;
    font-weight:800;
    letter-spacing:.5px;
    transition:.3s;
    position:relative;
}

.btn:hover{
    transform:translateY(-3px);
}

/* Pulsação */

.pulse{
    animation:pulse 1.5s infinite;
}

@keyframes pulse{

    0%{
        transform:scale(1);
        box-shadow:0 0 0 0 rgba(255,212,0,.9);
    }

    70%{
        transform:scale(1.06);
        box-shadow:0 0 0 30px rgba(255,212,0,0);
    }

    100%{
        transform:scale(1);
        box-shadow:0 0 0 0 rgba(255,212,0,0);
    }

}

/* Selo */

.badge{
    display:inline-block;
    background:#FFF5CC;
    color:#111;
    font-weight:700;
    padding:8px 16px;
    border-radius:50px;
    margin-bottom:20px;
    font-size:14px;
}

/* Rodapé */

.footer{
    margin-top:25px;
    color:#888;
    font-size:13px;
}

@media(max-width:600px){

    .card{
        padding:40px 25px;
    }

    h1{
        font-size:1.9rem;
    }

    .btn{
        font-size:18px;
    }

}

</style>
</head>
<body>

<div class="bg-circle-1"></div>
<div class="bg-circle-2"></div>
<div class="bg-circle-3"></div>

<div class="card">

    <div class="logo">
        🍻
    </div>

    <div class="badge">
        ACESSO EXCLUSIVO
    </div>

    <h1>Você tem 18 anos ou mais?</h1>

    <p class="subtitle">
        Confirme sua idade para continuar.
    </p>

    <!-- TROQUE PELO SEU LINK -->
    <a href="/pedido" class="btn pulse">
        CONTINUAR AGORA →
    </a>

    <div class="footer">
        Clique para prosseguir.
    </div>

</div>

</body>
</html>
